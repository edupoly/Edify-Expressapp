<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Job Registration</title>
</head>

<body>
    <h2>Student Job Application Form</h2>
    <form onsubmit="sendStudent(event)">
        <div>
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" required value="divya">
        </div><br>

        <div>
            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required value="divs@gmail.com">
        </div><br>

        <div>
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" required value="342">
        </div><br>

        <div>
            <label for="qualification">Highest Qualification:</label>
            <select id="qualification" name="qualification">
                <option value="btech">B.Tech / B.E</option>
                <option value="mca" selected>MCA</option>
                <option value="bsc">B.Sc Computer Science</option>
                <option value="other">Other</option>
            </select>
        </div><br>

        <div>
            <label for="resume">Upload Resume:</label>
            <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx">
        </div><br>

        <button type="submit">Apply Now</button>
        <a href="login.html">If you are already registerd Login</a>
    </form>
    <script>
        function sendStudent(ev) {
            ev.preventDefault();
            var student = {
                fullname: document.getElementById("fullname").value,
                email: document.getElementById("email").value,
                phone: document.getElementById("phone").value,
                qualification: document.getElementById("qualification").value,
                resume: ''
            }
            fetch("http://localhost:3700/regStudent", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(student)
            }).then(res => console.log(res))
        }
    </script>
</body>

</html>
