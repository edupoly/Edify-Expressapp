<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>All Tickets</h1>
    <table border="2">
        <thead>
            <tr>
                <th>Type</th>
                <th>Remarks</th>
                <th>Date</th>
                <th>Status</th>
                <th>Update</th>
            </tr>
        </thead>
        <tbody id="d1">

        </tbody>
    </table>
    <script>
        fetch("http://localhost:3700/getAllTickets")
            .then(res => res.json())
            .then(data => {
                data.forEach((issue, i) => {
                    var ntr = document.createElement("tr")
                    var ttd = document.createElement("td")
                    ttd.innerText = issue.issueType
                    ntr.appendChild(ttd)
                    var rtd = document.createElement("td")
                    rtd.innerText = issue.remarks
                    ntr.appendChild(rtd)
                    var dtd = document.createElement("td")
                    dtd.innerText = (new Date(issue.timeStamp)).toLocaleString()
                    ntr.appendChild(dtd)
                    var std = document.createElement("td")
                    std.innerText = issue.status
                    ntr.appendChild(std)
                    var btd = document.createElement("td")
                    btd.innerHTML = `<button onclick="startProcessing(${i})">Start Processing</button>`
                    ntr.appendChild(btd)
                    var deltd = document.createElement("td")
                    deltd.innerHTML = `<button onclick="deleteTicket(${i})">Delete</button>`
                    ntr.appendChild(deltd)
                    document.getElementById("d1").appendChild(ntr)
                })
            })
        function startProcessing(index) {
            fetch(`http://localhost:3700/updateTicket/${index}`, {
                method: "PUT"
            }).then(res => { console.log(res); })
        }
        function deleteTicket(index) {
            fetch(`http://localhost:3700/deleteTicket/${index}`, {
                method: "DELETE"
            }).then(res => { console.log(res); })
        }
    </script>
</body>

</html>
