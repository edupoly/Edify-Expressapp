<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form name="iform" onsubmit="issueTicket(event)">
        <label for="">Enter the type of problem</label>
        <br>
        <input type="text" name="typeofproblem" placeholder="enter the type of problem">
        <br>
        <label for="">Enter your Remarks</label>
        <br>
        <textarea name="remarks"></textarea>
        <br>
        <button type="submit">Submit the Issue</button>
    </form>
    <script>
        function issueTicket(ev) {
            ev.preventDefault();
            var issue = {
                issueType: document.iform.typeofproblem.value,
                remarks: document.iform.remarks.value
            }
            fetch("http://localhost:3700/riseTicket", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(issue)
            }).then(res => console.log(res))
        }
    </script>
</body>

</html>
